# Install-test workflow for weld (public repo)
# Verifies that install.sh works end-to-end on supported platforms.
name: Install Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: install-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  install-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run install.sh
        run: sh install.sh

      - name: Assert wd --version exits 0
        run: wd --version

      - name: Assert wd discover --help exits 0
        run: wd discover --help

      - name: Assert version matches VERSION file
        run: |
          expected="$(cat VERSION)"
          actual="$(wd --version)"
          if echo "${actual}" | grep -qF "${expected}"; then
            echo "Version match: ${actual} contains ${expected}"
          else
            echo "Version mismatch: wd --version output '${actual}' does not contain expected '${expected}'"
            exit 1
          fi

      - name: Assert wd doctor exits 0
        # Run against the checked-out repo root, which has a committed
        # .weld/discover.yaml and .weld/graph.json. A failing doctor here
        # means the installed package is broken (missing bundled modules,
        # broken entry point, missing strategies, etc.) — i.e. a packaging
        # regression we want to catch before users hit it on first run.
        run: wd doctor
