# DIAGNOSTIC — env + build steps, no pypa action
name: Publish to PyPI
on:
  push:
    tags: ["v*.*.*"]
permissions:
  contents: read
jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade build
      - run: python -m build weld
      - run: echo "would publish to PyPI here"
