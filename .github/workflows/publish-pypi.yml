# Release workflow for weld (public repo)
# Triggered on vX.Y.Z tag pushes. Builds sdist + wheel and uploads to PyPI.
#
# Auth mechanism: prefers Trusted Publishing (OIDC), falls back to a
# repository-level PYPI_API_TOKEN secret. Mechanism selection:
#
#   * If PYPI_API_TOKEN is NOT configured as a repository secret, the
#     expression ${{ secrets.PYPI_API_TOKEN }} evaluates to an empty
#     string; the pinned pypa/gh-action-pypi-publish release then uses
#     the ambient OIDC id-token (Trusted Publishing) minted by GitHub.
#   * If PYPI_API_TOKEN IS configured, the action uses that token
#     instead of OIDC.
#
# Supply-chain hardening: third-party actions are pinned to immutable
# commit SHAs (not moving tags). The comment next to each `uses:` line
# records the human-readable semver so the file stays auditable. Update
# the SHA when upstream ships a new release you have reviewed; do not
# switch back to a moving tag reference.
#
# PyPI-side setup for the preferred Trusted Publishing path: register
# this workflow as a Trusted Publisher on the PyPI project
# (configflux-weld) with workflow filename publish-pypi.yml and the
# optional environment "pypi".
name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pre-tag-verify:
    # Release-claim verifier (ADR 0032). Parses the most recent ``##
    # vX.Y.Z`` section in CHANGELOG.md and fails the workflow when a
    # bullet makes a concrete claim that the tagged tree does not back
    # up. Blocks the irreversible PyPI upload below: ``build-and-publish``
    # waits on this job via ``needs:``.
    name: Verify CHANGELOG release claims
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout
        # Pinned to an immutable commit SHA for supply-chain hardening.
        # Re-verify and bump when upstream ships a new v5.x release you
        # have reviewed. Current pin matches the `v5.0.1` tag.
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          fetch-depth: 0

      - name: Set up Python
        # Pinned to an immutable commit SHA for supply-chain hardening.
        # Re-verify and bump when upstream ships a new v6.x release you
        # have reviewed. Current pin matches the `v6.2.0` tag.
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Run release-claim verifier
        # The verifier (ADR 0032) lives in the internal repo only --
        # ``tools/release_claims_lint.py`` is in ``.publishignore`` so the
        # public wheel does not ship it. ``./local-task-gate`` already
        # runs the same check before any tag push, so this CI step is a
        # belt-and-braces redundancy. Skip cleanly when the file is
        # absent (always the case on the public mirror).
        run: |
          if [ -f tools/release_claims_lint.py ]; then
            python tools/release_claims_lint.py --strict
          else
            echo "release_claims_lint.py not present (internal-only); enforced pre-tag by ./local-task-gate."
          fi

  build-and-publish:
    name: Build and publish to PyPI
    needs: pre-tag-verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        # Pinned to an immutable commit SHA for supply-chain hardening.
        # Re-verify and bump when upstream ships a new v5.x release you
        # have reviewed. Current pin matches the `v5.0.1` tag.
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Set up Python
        # Pinned to an immutable commit SHA for supply-chain hardening.
        # Re-verify and bump when upstream ships a new v6.x release you
        # have reviewed. Current pin matches the `v6.2.0` tag.
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build weld

      - name: Smoke-test built wheel before publish
        # Run a real installed-wheel smoke before the irreversible PyPI upload.
        run: |
          set -euo pipefail
          workspace="${PWD}"
          python -m venv /tmp/weld-wheel-smoke
          /tmp/weld-wheel-smoke/bin/pip install --no-cache-dir weld/dist/configflux_weld-*.whl
          export PATH="/tmp/weld-wheel-smoke/bin:${PATH}"

          repo="$(mktemp -d)"
          cd "${repo}"
          wd --version
          wd --help >/dev/null
          wd discover --help >/dev/null
          python -c "import weld"
          python -m weld.mcp_server --help >/dev/null
          python - "${workspace}/weld/pyproject.toml" <<'PYCHECK'
          import importlib
          import sys
          import tomllib

          with open(sys.argv[1], "rb") as pyproject:
              packages = tomllib.load(pyproject)["tool"]["setuptools"]["packages"]
          for name in packages:
              importlib.import_module(name)
          print(f"all {len(packages)} subpackages imported OK")
          PYCHECK

          git init --quiet
          git config user.email "smoke@example.invalid"
          git config user.name "Weld Smoke Test"
          mkdir -p src .github/agents .agents/skills/review
          printf '# Smoke Repo\n\nAuth behavior.\n' > README.md
          printf 'def authenticate(token: str) -> bool:\n    return token == "ok"\n' > src/auth.py
          printf '# Agent Instructions\n\nRun tests before finalizing.\n' > AGENTS.md
          cat > .github/agents/planner.agent.md <<'EOF'
          ---
          name: planner
          description: Plans implementation work before editing.
          ---
          # Planner
          Use Weld before editing.
          EOF
          cat > .agents/skills/review/SKILL.md <<'EOF'
          ---
          name: review
          description: Review code changes.
          ---
          # Review Skill
          Check correctness and maintainability.
          EOF
          git add -A
          git commit --quiet -m "smoke seed"

          wd init >/dev/null
          wd discover --safe --output .weld/graph.json >/dev/null
          wd doctor >/dev/null
          wd graph stats >/dev/null
          wd graph validate >/dev/null
          wd query auth >/dev/null
          wd brief auth >/dev/null
          wd context auth >/dev/null
          wd build-index >/dev/null
          wd find authenticate >/dev/null
          wd agents discover >/dev/null
          wd agents list >/dev/null
          wd agents audit >/dev/null
          wd agents explain planner >/dev/null
          wd agents impact .github/agents/planner.agent.md >/dev/null
          wd agents plan-change "planner should mention tests" >/dev/null
          wd mcp config --client=claude >/dev/null
          wd mcp config --client=vscode >/dev/null
          wd mcp config --client=cursor >/dev/null

      - name: MCP extra handshake on built wheel
        # Wire-level JSON-RPC handshake against the [mcp] extra of the
        # freshly built wheel. Catches packaging regressions where the
        # extra is declared but the wheel cannot serve MCP at runtime.
        # Runs before the irreversible PyPI upload so a drift between
        # the registry and the embedded fixture in
        # tools/release_mcp_handshake.py fails the release here.
        run: |
          set -euo pipefail
          python -m venv /tmp/weld-mcp-smoke
          wheel_path=$(ls weld/dist/configflux_weld-*.whl | head -n1)
          /tmp/weld-mcp-smoke/bin/pip install --no-cache-dir "${wheel_path}[mcp]"
          /tmp/weld-mcp-smoke/bin/python tools/release_mcp_handshake.py

      - name: Publish to PyPI
        # Pinned to an immutable commit SHA for supply-chain hardening.
        # Re-verify and bump when upstream ships a new release you have
        # reviewed. Current pin matches the tip of `release/v1` and the
        # `v1.14.0` tag as of 2026-04-19.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          packages-dir: weld/dist
          password: ${{ secrets.PYPI_API_TOKEN }}

  verify-install:
    name: Verify pip install of tagged release (py ${{ matrix.python-version }})
    needs: build-and-publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only contents: read -- this job installs from public PyPI and must
    # not inherit any elevated OIDC permission from the publish job.
    permissions:
      contents: read
    # Runtime matrix smoke: README advertises Python 3.10-3.13. The
    # build-and-publish smoke above only exercises the publish-version
    # interpreter (3.12); this matrix ensures the published wheel
    # actually installs and imports under every advertised version.
    #
    # fail-fast: false so a single bad slot does not mask the others --
    # we want the full evidence map for every matrix slot. Default job
    # failure semantics still apply (any slot failure -> workflow fails),
    # which keeps the matrix release-blocking.
    #
    # The full ``wd`` smoke runs only on 3.12 (the publish-version
    # interpreter, already known-working end-to-end). The MCP JSON-RPC
    # handshake now runs on every advertised version: the handshake
    # script feeds messages one at a time with a small inter-message
    # pause (see tools/release_mcp_handshake.py), which avoids the
    # subprocess.run-driven EOF race that previously hung the server
    # before it answered ``tools/list`` on Python 3.10/3.11/3.12.
    # Other slots still skip the rich ``wd`` smoke to keep the matrix
    # fast on ubuntu-latest.
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        # Pinned to an immutable commit SHA for supply-chain hardening.
        # Re-verify and bump when upstream ships a new v5.x release you
        # have reviewed. Current pin matches the `v5.0.1` tag.
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Set up Python
        # Pinned to an immutable commit SHA for supply-chain hardening.
        # Re-verify and bump when upstream ships a new v6.x release you
        # have reviewed. Current pin matches the `v6.2.0` tag.
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Wait for PyPI CDN propagation
        # PyPI's CDN typically takes 60-120 seconds to surface a freshly
        # uploaded release. Installing sooner can race the CDN and raise
        # spurious "version not found" failures. 90s is a conservative
        # middle of the documented window.
        run: sleep 90

      - name: Derive version from tag
        id: version
        # github.ref_name is "vX.Y.Z" on a tag push; strip the leading "v"
        # so pip sees the PEP 440 version "X.Y.Z". The tag is read via an
        # env var rather than direct `${{ }}` interpolation into the run
        # script body so a tag containing shell metacharacters cannot
        # alter the command (defense in depth, on top of the 'v*.*.*'
        # tag-trigger filter).
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          version="${REF_NAME#v}"
          # Validate: must be strict PEP 440 X.Y.Z (digits + dots only)
          # after stripping the leading "v". Anything else is rejected
          # before it can reach pip or Python.
          if ! printf '%s' "${version}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Rejected non-conforming tag: ${REF_NAME}"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Install tagged release from PyPI
        # --no-cache-dir forces a fresh metadata fetch so we exercise the
        # real PyPI index and do not test a cached copy of the previous
        # version. Pinning the exact version catches a silent rollback
        # where PyPI still shows the prior release. PKG_VERSION is
        # exported as an env var so the run script never interpolates a
        # raw GitHub expression mid-command.
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          pip install --no-cache-dir "configflux-weld==${PKG_VERSION}"

      - name: Basic install smoke (all matrix slots)
        # Minimal cross-version smoke that runs on every advertised Python
        # interpreter. Proves the wheel installed cleanly and the
        # console script + version metadata are wired on this
        # interpreter. The richer ``wd``/MCP smoke below is gated to
        # 3.12 only -- this step is the floor every matrix slot must
        # clear for the release to be considered installable on that
        # Python version.
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          wd --version
          wd --help >/dev/null
          python -c "import os; from importlib.metadata import version; expected = os.environ['PKG_VERSION']; v = version('configflux-weld'); print(f'configflux-weld {v} on python ${{ matrix.python-version }}'); assert v == expected, f'version mismatch: expected {expected}, got {v}'"

      - name: Install [mcp] extra (all matrix slots)
        # Prove the ``[mcp]`` extra resolves and installs on every
        # advertised Python interpreter, even on slots where the
        # JSON-RPC handshake itself is 3.12-only. This catches a
        # packaging regression where the extra's transitive deps drop
        # support for one of our advertised Python versions before the
        # users hit it. Uses a separate venv so the basic smoke step
        # above stays a clean ``configflux-weld`` (no extras) install.
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          python -m venv /tmp/weld-mcp-extra-install
          /tmp/weld-mcp-extra-install/bin/pip install --no-cache-dir "configflux-weld[mcp]==${PKG_VERSION}"
          /tmp/weld-mcp-extra-install/bin/python -c "import os; from importlib.metadata import version; expected = os.environ['PKG_VERSION']; v = version('configflux-weld'); print(f'configflux-weld[mcp] {v} on python ${{ matrix.python-version }}'); assert v == expected, f'version mismatch: expected {expected}, got {v}'"

      - name: Smoke-test installed package
        # Full ``wd`` smoke -- run only on the publish-version interpreter
        # (3.12). Other matrix slots stop after the basic install smoke
        # above so we do not trip the 3.11 MCP handshake hang and so
        # the matrix stays fast on ubuntu-latest.
        if: matrix.python-version == '3.12'
        # The exact published version must run real CLI workflows from an
        # installed console script, not from the source checkout.
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          repo="$(mktemp -d)"
          cd "${repo}"
          wd --version
          wd discover --help > /dev/null
          python -c "import os; from importlib.metadata import version; expected = os.environ['PKG_VERSION']; v = version('configflux-weld'); print(f'configflux-weld {v}'); assert v == expected, f'version mismatch: expected {expected}, got {v}'"
          wd --help >/dev/null
          python -m weld.mcp_server --help >/dev/null

          git init --quiet
          git config user.email "smoke@example.invalid"
          git config user.name "Weld Smoke Test"
          mkdir -p src .github/agents .agents/skills/review
          printf '# Smoke Repo\n\nAuth behavior.\n' > README.md
          printf 'def authenticate(token: str) -> bool:\n    return token == "ok"\n' > src/auth.py
          printf '# Agent Instructions\n\nRun tests before finalizing.\n' > AGENTS.md
          cat > .github/agents/planner.agent.md <<'EOF'
          ---
          name: planner
          description: Plans implementation work before editing.
          ---
          # Planner
          Use Weld before editing.
          EOF
          cat > .agents/skills/review/SKILL.md <<'EOF'
          ---
          name: review
          description: Review code changes.
          ---
          # Review Skill
          Check correctness and maintainability.
          EOF
          git add -A
          git commit --quiet -m "smoke seed"

          wd init >/dev/null
          wd discover --safe --output .weld/graph.json >/dev/null
          wd doctor >/dev/null
          wd graph stats >/dev/null
          wd graph validate >/dev/null
          wd query auth >/dev/null
          wd brief auth >/dev/null
          wd context auth >/dev/null
          wd build-index >/dev/null
          wd find authenticate >/dev/null
          wd agents discover >/dev/null
          wd agents list >/dev/null
          wd agents audit >/dev/null
          wd agents explain planner >/dev/null
          wd agents impact .github/agents/planner.agent.md >/dev/null
          wd agents plan-change "planner should mention tests" >/dev/null
          wd mcp config --client=claude >/dev/null
          wd mcp config --client=vscode >/dev/null
          wd mcp config --client=cursor >/dev/null


      - name: MCP extra handshake on PyPI-installed wheel
        # Mirror of the build-phase handshake against the artifact PyPI
        # actually serves. Catches a packaging regression that only
        # surfaces after PyPI's CDN is exercised (cached metadata,
        # missing files in the published wheel, post-upload tampering).
        # If this fails, the release was bad even though the upload
        # succeeded; the failing job flags it before users discover it.
        #
        # Runs on every advertised Python interpreter (3.10-3.13). The
        # handshake script (tools/release_mcp_handshake.py) drives the
        # mcp stdio server with one JSON-RPC line per write+flush and a
        # small inter-message pause, which keeps the wire shape stable
        # across interpreter versions and eliminates the
        # subprocess.run-driven EOF race that previously left
        # ``tools/list`` unanswered on 3.10/3.11/3.12.
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          python -m venv /tmp/weld-mcp-verify
          /tmp/weld-mcp-verify/bin/pip install --no-cache-dir "configflux-weld[mcp]==${PKG_VERSION}"
          /tmp/weld-mcp-verify/bin/python tools/release_mcp_handshake.py
