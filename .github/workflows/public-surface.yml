# Public surface workflow for weld.
# Runs lightweight checks that are safe to publish with the public repo.
name: Public Surface

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: public-surface-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  public-surface:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run public lint
        run: python3 tools/public_lint.py

      - name: Run public surface audit
        run: python3 tools/public_surface_audit.py
