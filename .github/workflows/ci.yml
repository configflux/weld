# CI workflow for cortex (public repo)
# Runs Bazel build + test on push to main and PRs.
# This file is overlaid into the public repo as .github/workflows/ci.yml
# by the publish script.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Mount Bazel cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: |
            ~/.cache/bazel-disk
            ~/.cache/bazel-repo
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelrc') }}
          restore-keys: |
            bazel-${{ runner.os }}-

      - name: Prepare cache directories
        run: |
          mkdir -p ~/.cache/bazel-disk
          mkdir -p ~/.cache/bazel-repo

      - name: Build
        run: |
          bazelisk \
            --output_user_root="${HOME}/.cache/bazel-repo" \
            build \
            --disk_cache="${HOME}/.cache/bazel-disk" \
            //...

      - name: Test
        run: |
          bazelisk \
            --output_user_root="${HOME}/.cache/bazel-repo" \
            test \
            --disk_cache="${HOME}/.cache/bazel-disk" \
            //...
