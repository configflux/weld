# CI workflow for cortex
# Runs Bazel build + test on push to main and PRs.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel-disk
            ~/.cache/bazel-repo
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelrc') }}
          restore-keys: |
            bazel-${{ runner.os }}-

      - name: Prepare cache directories
        run: |
          mkdir -p ~/.cache/bazel-disk
          mkdir -p ~/.cache/bazel-repo

      - name: Build
        run: |
          bazelisk \
            --output_user_root="${HOME}/.cache/bazel-repo" \
            build \
            --disk_cache="${HOME}/.cache/bazel-disk" \
            //...

      - name: Test
        run: |
          bazelisk \
            --output_user_root="${HOME}/.cache/bazel-repo" \
            test \
            --disk_cache="${HOME}/.cache/bazel-disk" \
            //...
