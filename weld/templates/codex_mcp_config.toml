# Project-scoped Codex MCP config for Weld.
#
# Codex reads MCP servers from `.codex/config.toml`, not from `.mcp.json`.
# `wd bootstrap codex` writes this file so Codex can use both the local
# `weld` MCP server and Context7 developer docs in the same project.

# weld-managed:start name=mcp-servers
[mcp_servers.weld]
command = "python"
args = ["-m", "weld.mcp_server"]

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]
# weld-managed:end name=mcp-servers
