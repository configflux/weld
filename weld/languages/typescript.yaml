# Tree-sitter queries for TypeScript symbol extraction.

language: typescript
grammar_package: tree_sitter_typescript

queries:
  exports: "(export_statement (function_declaration name: (identifier) @name)) (export_statement (class_declaration name: (type_identifier) @name)) (export_statement (lexical_declaration (variable_declarator name: (identifier) @name))) (export_statement (interface_declaration name: (type_identifier) @name)) (export_statement (type_alias_declaration name: (type_identifier) @name)) (export_statement (enum_declaration name: (identifier) @name))"
  classes: "(export_statement (class_declaration name: (type_identifier) @name)) (export_statement (interface_declaration name: (type_identifier) @name))"
  imports: "(import_statement source: (string) @name)"
  calls: "(call_expression function: (identifier) @name) (call_expression function: (member_expression property: (property_identifier) @name))"
