# discover.yaml -- Weld discovery configuration for an IaC project.
#
# This configuration demonstrates five strategies working together to
# build a unified connected structure from infrastructure-as-code artifacts:
#
#   1. dockerfile        -- extracts base images, stages, and exposed ports
#   2. compose           -- extracts services, dependencies, and port mappings
#   3. gh_workflow        -- extracts GitHub Actions jobs, triggers, and steps
#   4. yaml_meta         -- extracts metadata from arbitrary YAML configs
#   5. boundary_entrypoint -- identifies network boundaries and entry points
#
# Run `wd discover` from this directory to produce the connected structure.

sources:
  # -- Dockerfiles: extract container build metadata --------------------
  - glob: "Dockerfile*"
    type: file
    strategy: dockerfile

  # -- Compose: extract services, dependencies, and network topology ----
  - glob: "docker-compose.yml"
    type: config
    strategy: compose

  # -- GitHub Actions: extract CI/CD workflow structure ------------------
  - glob: ".github/workflows/*.yml"
    type: config
    strategy: gh_workflow

  # -- Terraform: extract IaC module metadata as generic YAML nodes -----
  - glob: "terraform/**/*.tf"
    type: config
    strategy: yaml_meta

  # -- Boundaries: identify network entry points and exposed surfaces ---
  - glob: "docker-compose.yml"
    type: boundary
    strategy: boundary_entrypoint
