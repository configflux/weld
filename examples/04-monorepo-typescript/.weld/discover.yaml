# discover.yaml -- Weld discovery configuration for the @acme monorepo.
#
# This monorepo demonstrates a realistic layered layout:
#
#   apps/      -- user-facing applications (web)
#   packages/  -- front-end-facing libraries (ui, api)
#   libs/      -- polyglot/shared libraries (shared-types)
#   services/  -- long-running backend services (orders-api)
#
# In addition to source packages, the example carries runtime and
# operational artifacts so `wd discover` emits a realistic node mix
# for tutorial walkthroughs: Docker runtime files, GitHub Actions
# workflows, architecture docs, and ADRs.
#
# Run `wd discover` from this directory to produce the connected structure.

sources:
  # -- UI package: extract exported components and interfaces ----------
  - glob: "packages/ui/src/**/*.{ts,tsx}"
    type: file
    strategy: typescript_exports
    id_prefix: ui
    package: "pkg:ui"

  # -- API package: extract exported client functions and types --------
  - glob: "packages/api/src/**/*.ts"
    type: file
    strategy: typescript_exports
    id_prefix: api
    package: "pkg:api"

  # -- Web app: extract page components and layouts --------------------
  - glob: "apps/web/src/**/*.{ts,tsx}"
    type: file
    strategy: typescript_exports
    id_prefix: web
    package: "pkg:web"

  # -- Shared domain types consumed by both client and server ----------
  - glob: "libs/shared-types/src/**/*.ts"
    type: file
    strategy: typescript_exports
    id_prefix: shared-types
    package: "lib:shared-types"

  # -- Orders service: backend handlers + domain logic -----------------
  - glob: "services/orders-api/src/**/*.ts"
    type: file
    strategy: typescript_exports
    id_prefix: orders-api
    package: "service:orders-api"

  # -- Manifests: extract build/test scripts from every package.json ---
  - glob: "**/package.json"
    type: config
    strategy: manifest

  # -- Container runtime ----------------------------------------------
  - glob: "docker/Dockerfile*"
    type: file
    strategy: dockerfile

  - glob: "docker/docker-compose.yml"
    type: config
    strategy: compose

  # -- CI workflows ---------------------------------------------------
  - glob: ".github/workflows/*.yml"
    type: config
    strategy: gh_workflow

  # -- Architecture doc ------------------------------------------------
  - glob: "docs/*.md"
    type: doc
    strategy: markdown
    id_prefix: guide
    doc_kind: guide

  # -- ADR history -----------------------------------------------------
  - glob: "docs/adr/*.md"
    type: doc
    strategy: markdown
    id_prefix: adr
    doc_kind: adr
